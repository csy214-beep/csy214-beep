<svg width="100%" height="auto" viewBox="0 0 650 240" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; height: 100%; box-sizing: border-box; padding: 5px;">
      <style>
        .card {
          background: #ffffff;
          border: 1px solid #d0d7de;
          border-radius: 6px;
          padding: 18px 24px;
          height: 100%;
          box-sizing: border-box;
          display: flex;
          flex-direction: column;
          justify-content: space-between;
        }
        /* 顶部：信息与爱好横向分布 */
        .header {
          display: flex;
          justify-content: space-between;
          align-items: flex-start;
        }
        .meta-primary {
          color: #24292f;
          font-size: 15px;
          font-weight: 600;
          margin-bottom: 4px;
        }
        .meta-secondary {
          color: #57606a;
          font-size: 13px;
        }
        .hobbies {
          display: flex;
          gap: 8px;
        }
        .hobby-tag {
          background: #dafbe1;
          color: #1a7f37;
          border: 1px solid #a6e5a0;
          font-size: 12px;
          padding: 3px 10px;
          border-radius: 2em;
          font-weight: 500;
        }
        /* 中部：技能区域 */
        .skills-container {
          margin: 12px 0;
        }
        .section-title {
          font-size: 12px;
          font-weight: 600;
          color: #57606a;
          margin-bottom: 8px;
          text-transform: uppercase;
          letter-spacing: 0.5px;
        }
        .tags {
          display: flex;
          flex-wrap: wrap;
          gap: 8px;
        }
        .tag {
          background: #f6f8fa;
          color: #24292f;
          border: 1px solid #d0d7de;
          font-size: 12px;
          padding: 4px 12px;
          border-radius: 2em;
        }
        .tag.strike {
          color: #8c959f;
          background: #ffffff;
          border-color: #e1e4e8;
        }
        .tag.strike s {
          text-decoration-color: #8c959f;
        }
        /* 底部：格言与脚注 */
        .footer {
          display: flex;
          justify-content: space-between;
          align-items: center;
          border-top: 1px dashed #d0d7de;
          padding-top: 12px;
        }
        .motto {
          font-size: 14px;
          color: #24292f;
          font-style: italic;
          font-weight: 500;
        }
        .note {
          font-size: 12px;
          color: #57606a;
        }
      </style>

      <div class="card">
        <div class="header">
          <div>
            <div class="meta-primary">In SiChuan, PRC · Student</div>
            <div class="meta-secondary">A rookie</div>
          </div>
          <div class="hobbies">
            <span class="hobby-tag">Playing games</span>
            <span class="hobby-tag">Creating something</span>
          </div>
        </div>

        <div class="skills-container">
          <div class="section-title">Skills</div>
          <div class="tags">
            <span class="tag">Python</span>
            <span class="tag">C/C++</span>
            <span class="tag strike"><s>Fortran</s></span>
            <span class="tag strike"><s>R</s></span>
            <span class="tag strike"><s>C#</s></span>
            <span class="tag strike"><s>Kotlin</s></span>
            <span class="tag strike"><s>Dart</s></span>
            <span class="tag">Live2D</span>
            <span class="tag">Linux</span>
            <span class="tag">basic frontend</span>
          </div>
        </div>

        <div class="footer">
          <div class="motto">于二进制潮汐涨落之间求索</div>
          <div class="note">Feel free to connect and collaborate!</div>
        </div>
      </div>
    </div>
  </foreignObject>
</svg>

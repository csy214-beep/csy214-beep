<!-- 简约个人卡片 SVG – 无链接 / 无圆角 / 宽度自适应 / 中文格言 -->
<svg width="100%" height="auto" viewBox="0 0 560 390" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml" style="font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
      <style>
        .card {
          background: #ffffff;
          border-radius: 0;            /* 无圆角 */
          box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
          padding: 28px 30px;
          max-width: 500px;
          margin: 0 auto;
          transition: box-shadow 0.2s ease;
        }
        .card:hover {
          box-shadow: 0 12px 32px rgba(0, 0, 0, 0.12);
        }
        /* 位置/身份（合并为一行） */
        .meta {
          color: #5a5a70;
          font-size: 15px;
          margin: 0 0 20px 0;
          line-height: 1.5;
        }
        /* 区块标题 */
        .section-title {
          font-size: 18px;
          font-weight: 600;
          color: #222;
          margin: 22px 0 12px 0;
        }
        .section-title:first-of-type {
          margin-top: 0;
        }
        /* 技能标签 */
        .skill-tag {
          background: #edf0f7;
          color: #1e2b4f;
          font-size: 13px;
          padding: 5px 14px;
          border-radius: 30px;
          display: inline-block;
          margin: 0 6px 8px 0;
          white-space: nowrap;
        }
        .skill-tag s {
          color: #7a7a8c;
          text-decoration: line-through;
        }
        /* 爱好列表 */
        .hobby-list {
          list-style: none;
          padding: 0;
          margin: 8px 0 0 0;
          display: flex;
          flex-wrap: wrap;
          gap: 12px;
        }
        .hobby-list li {
          background: #f4f0ea;
          color: #5f4e3a;
          font-size: 14px;
          padding: 5px 18px;
          border-radius: 30px;
        }
        /* 格言（中文） */
        .motto {
          margin: 32px 0 8px 0;
          padding: 16px 0 0 0;
          border-top: 1.5px dashed #cdcddd;
          text-align: center;
          font-style: italic;
          color: #4a4a66;
          font-size: 16px;
          letter-spacing: 0.3px;
        }
        /* 脚注 */
        .footer-note {
          text-align: center;
          font-size: 13px;
          color: #a0a0b8;
          margin-top: 8px;
          font-style: italic;
        }
      </style>
      <div class="card">
        <!-- 位置 + 身份（合并为一行） -->
        <div class="meta">
        In SiChuan, PRC · Student <br></br>
		A rookie
        </div>
        <!-- 技能区域 -->
        <div class="section-title">Skills</div>
        <div>
          <span class="skill-tag">Python</span>
          <span class="skill-tag">C/C++</span>
          <span class="skill-tag"><s>Fortran</s></span>
          <span class="skill-tag"><s>R</s></span>
          <span class="skill-tag"><s>C#</s></span>
          <span class="skill-tag"><s>Kotlin</s></span>
          <span class="skill-tag"><s>Dart</s></span>
          <span class="skill-tag">Live2D</span>
          <span class="skill-tag">Linux</span>
          <span class="skill-tag">basic frontend</span>
        </div>
        <!-- 爱好区域 -->
        <div class="section-title">Hobbies</div>
        <ul class="hobby-list">
          <li>Playing games</li>
          <li>Creating something</li>
        </ul>
        <!-- 中文格言 -->
        <div class="motto">
        于二进制潮汐涨落之间求索
        </div>
        <!-- 脚注 -->
        <div class="footer-note">
          Feel free to connect and collaborate!
        </div>
      </div>
    </div>
  </foreignObject>
</svg>

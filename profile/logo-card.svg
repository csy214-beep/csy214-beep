<svg xmlns="http://www.w3.org/2000/svg" width="580" height="205" viewBox="0 0 580 205">
<defs>

  <!-- ══ 发光滤镜 ══ -->
  <filter id="gc" x="-45%" y="-45%" width="190%" height="190%">
    <feGaussianBlur stdDeviation="5" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="gp" x="-45%" y="-45%" width="190%" height="190%">
    <feGaussianBlur stdDeviation="6" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="gb" x="-12%" y="-12%" width="124%" height="124%">
    <feGaussianBlur stdDeviation="7" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>

  <!-- ══ 渐变色 ══ -->
  <radialGradient id="bg" cx="50%" cy="42%" r="62%">
    <stop offset="0%"   stop-color="#0e1d3c"/>
    <stop offset="100%" stop-color="#040810"/>
  </radialGradient>

  <linearGradient id="bord" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%"   stop-color="#00eaff"/>
    <stop offset="46%"  stop-color="#9044f5"/>
    <stop offset="100%" stop-color="#ff2060"/>
  </linearGradient>

  <linearGradient id="bord-lo" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%"   stop-color="#00eaff" stop-opacity=".35"/>
    <stop offset="46%"  stop-color="#9044f5" stop-opacity=".25"/>
    <stop offset="100%" stop-color="#ff2060" stop-opacity=".35"/>
  </linearGradient>

  <!-- ══ 云形剪切路径（5顶突 + 3底突） ══ -->
  <clipPath id="cc">
    <path d="
      M 62,175
      C 28,175 22,140 41,122
      C 21,104 26,77  55,75
      C 44,49  85,37  114,58
      C 123,28 168,22 192,52
      C 208,20 258,16 280,49
      C 302,16 352,20 368,52
      C 392,22 437,28 446,58
      C 475,37 516,49 505,75
      C 534,77 539,104 519,122
      C 538,140 532,175 498,175
      C 486,192 445,194 431,177
      C 407,198 356,198 330,180
      C 304,200 257,200 230,180
      C 204,198 153,198 129,177
      C 115,194 74,192 62,175 Z
    "/>
  </clipPath>

  <!-- ══ CSS 动画 ══ -->
  <style>
    .ac {
      font-family: 'Courier New', Courier, monospace;
      font-size: 42px;
      font-weight: 700;
      fill: #00eaff;
      text-anchor: middle;
      dominant-baseline: central;
      transform-box: fill-box;
      transform-origin: center 75%;
      filter: url(#gc);
      animation: aa 10s linear infinite both;
    }
    .lc {
      font-family: 'Arial Black', 'Arial Bold', Impact, sans-serif;
      font-size: 80px;
      font-weight: 900;
      fill: #ff2060;
      text-anchor: middle;
      dominant-baseline: central;
      transform-box: fill-box;
      transform-origin: center 75%;
      filter: url(#gp);
      animation: la 10s linear infinite both;
    }

    /* 数字：可见 → 向前倒下（加速+斜） → 弹起（弹性过冲） → 可见 */
    @keyframes aa {
      0%    { transform: scaleY(1)    skewX(0deg);              opacity: 1; }
      15%   { transform: scaleY(1)    skewX(0deg);              opacity: 1;
              animation-timing-function: cubic-bezier(.42,0,.9,.4); }
      20%   { transform: scaleY(.52)  skewX(-8deg) translateY(5px);  opacity: .48;
              animation-timing-function: ease-in; }
      25%   { transform: scaleY(.03)  skewX(-14deg) translateY(9px); opacity: 0; }
      26%   { transform: scaleY(0)    skewX(-14deg);            opacity: 0; }

      68%   { transform: scaleY(0)    skewX(14deg) translateY(-9px); opacity: 0;
              animation-timing-function: cubic-bezier(0,.65,.28,1); }
      73%   { transform: scaleY(.58)  skewX(7deg)  translateY(-4px); opacity: .55;
              animation-timing-function: cubic-bezier(.08,0,.18,1.65); }
      76%   { transform: scaleY(1.15) skewX(-3deg) translateY(3px);  opacity: 1;
              animation-timing-function: ease-out; }
      78%   { transform: scaleY(.96)  skewX(.8deg);            opacity: 1; }
      80%   { transform: scaleY(1.03);                          opacity: 1; }
      82%   { transform: scaleY(1);                             opacity: 1; }
      100%  { transform: scaleY(1);                             opacity: 1; }
    }

    /* 字母：隐藏 → 弹起 → 可见 → 向前倒下 → 隐藏 */
    @keyframes la {
      0%    { transform: scaleY(0)    skewX(14deg) translateY(-9px); opacity: 0; }
      29%   { transform: scaleY(0)    skewX(14deg) translateY(-9px); opacity: 0;
              animation-timing-function: cubic-bezier(0,.65,.28,1); }
      35%   { transform: scaleY(.58)  skewX(7deg)  translateY(-4px); opacity: .55;
              animation-timing-function: cubic-bezier(.08,0,.18,1.65); }
      38%   { transform: scaleY(1.15) skewX(-3deg) translateY(3px);  opacity: 1;
              animation-timing-function: ease-out; }
      40%   { transform: scaleY(.96)  skewX(.8deg);            opacity: 1; }
      42%   { transform: scaleY(1.03);                          opacity: 1; }
      44%   { transform: scaleY(1);                             opacity: 1; }

      62%   { transform: scaleY(1)    skewX(0deg);              opacity: 1;
              animation-timing-function: cubic-bezier(.42,0,.9,.4); }
      68%   { transform: scaleY(.52)  skewX(-8deg) translateY(5px);  opacity: .48;
              animation-timing-function: ease-in; }
      73%   { transform: scaleY(.03)  skewX(-14deg) translateY(9px); opacity: 0; }
      74%   { transform: scaleY(0)    skewX(-14deg);            opacity: 0; }
      100%  { transform: scaleY(0)    skewX(-14deg);            opacity: 0; }
    }

    /* 左→右多米诺延迟 */
    .d0 { animation-delay:  0s;   }
    .d1 { animation-delay: .17s;  }
    .d2 { animation-delay: .34s;  }
    .d3 { animation-delay: .51s;  }
    .d4 { animation-delay: .68s;  }
  </style>
</defs>

<!-- ══ 云朵底色 ══ -->
<g clip-path="url(#cc)">
  <rect width="580" height="205" fill="url(#bg)"/>

  <!-- 极淡科技网格 -->
  <g stroke="#4af" stroke-width=".5" opacity=".038">
    <line x1="0"   y1="35"  x2="580" y2="35"/>
    <line x1="0"   y1="70"  x2="580" y2="70"/>
    <line x1="0"   y1="105" x2="580" y2="105"/>
    <line x1="0"   y1="140" x2="580" y2="140"/>
    <line x1="0"   y1="175" x2="580" y2="175"/>
    <line x1="96"  y1="0"   x2="96"  y2="205"/>
    <line x1="193" y1="0"   x2="193" y2="205"/>
    <line x1="290" y1="0"   x2="290" y2="205"/>
    <line x1="387" y1="0"   x2="387" y2="205"/>
    <line x1="484" y1="0"   x2="484" y2="205"/>
  </g>

  <!-- 中心竖轴光线 -->
  <line x1="290" y1="40" x2="290" y2="168"
        stroke="#7040e8" stroke-width=".9" opacity=".18"/>

  <!-- 顶部菱形 -->
  <polygon points="290,25 297,32 290,39 283,32"
           fill="none" stroke="#9044f5" stroke-width="1.2" opacity=".55"/>
  <!-- 底部菱形 -->
  <polygon points="290,168 297,175 290,182 283,175"
           fill="none" stroke="#9044f5" stroke-width="1.2" opacity=".42"/>

  <!-- 左侧十字（青） -->
  <g stroke="#00eaff" stroke-width="1.1" opacity=".4">
    <line x1="84"  y1="55"  x2="84"  y2="66"/><line x1="78"  y1="60"  x2="90"  y2="60"/>
    <line x1="80"  y1="142" x2="80"  y2="153"/><line x1="74"  y1="147" x2="86"  y2="147"/>
  </g>
  <!-- 右侧十字（粉） -->
  <g stroke="#ff2060" stroke-width="1.1" opacity=".4">
    <line x1="496" y1="55"  x2="496" y2="66"/><line x1="490" y1="60"  x2="502" y2="60"/>
    <line x1="500" y1="142" x2="500" y2="153"/><line x1="494" y1="147" x2="506" y2="147"/>
  </g>

  <!-- 顶部装饰微点 -->
  <circle cx="134" cy="38"  r="1.6" fill="#9044f5" opacity=".65"/>
  <circle cx="190" cy="28"  r="1.1" fill="#00eaff" opacity=".6"/>
  <circle cx="246" cy="23"  r="1.1" fill="#00eaff" opacity=".5"/>
  <circle cx="334" cy="23"  r="1.1" fill="#ff2060" opacity=".5"/>
  <circle cx="390" cy="28"  r="1.1" fill="#ff2060" opacity=".6"/>
  <circle cx="446" cy="38"  r="1.6" fill="#9044f5" opacity=".65"/>

  <!-- 底部微点 -->
  <circle cx="163" cy="178" r="1.6" fill="#00eaff" opacity=".45"/>
  <circle cx="290" cy="184" r="1.8" fill="#9044f5" opacity=".5"/>
  <circle cx="417" cy="178" r="1.6" fill="#ff2060" opacity=".45"/>
</g>

<!-- ══ 云朵边框：外晕（发光层） ══ -->
<path d="M 62,175 C 28,175 22,140 41,122 C 21,104 26,77 55,75 C 44,49 85,37 114,58 C 123,28 168,22 192,52 C 208,20 258,16 280,49 C 302,16 352,20 368,52 C 392,22 437,28 446,58 C 475,37 516,49 505,75 C 534,77 539,104 519,122 C 538,140 532,175 498,175 C 486,192 445,194 431,177 C 407,198 356,198 330,180 C 304,200 257,200 230,180 C 204,198 153,198 129,177 C 115,194 74,192 62,175 Z"
      fill="none" stroke="url(#bord-lo)" stroke-width="11" filter="url(#gb)"/>

<!-- ══ 云朵边框：主描边 ══ -->
<path d="M 62,175 C 28,175 22,140 41,122 C 21,104 26,77 55,75 C 44,49 85,37 114,58 C 123,28 168,22 192,52 C 208,20 258,16 280,49 C 302,16 352,20 368,52 C 392,22 437,28 446,58 C 475,37 516,49 505,75 C 534,77 539,104 519,122 C 538,140 532,175 498,175 C 486,192 445,194 431,177 C 407,198 356,198 330,180 C 304,200 257,200 230,180 C 204,198 153,198 129,177 C 115,194 74,192 62,175 Z"
      fill="none" stroke="url(#bord)" stroke-width="2.2"/>

<!-- ══ 文字（裁入云形） ══ -->
<g clip-path="url(#cc)">
  <!-- ASCII 数字 -->
  <text class="ac d0" x="148" y="106">80</text>
  <text class="ac d1" x="219" y="106">70</text>
  <text class="ac d2" x="290" y="106">79</text>
  <text class="ac d3" x="361" y="106">76</text>
  <text class="ac d4" x="432" y="106">71</text>
  <!-- 字母 -->
  <text class="lc d0" x="148" y="108">P</text>
  <text class="lc d1" x="219" y="108">F</text>
  <text class="lc d2" x="290" y="108">O</text>
  <text class="lc d3" x="361" y="108">L</text>
  <text class="lc d4" x="432" y="108">G</text>
</g>

</svg>

name: Update README cards

# https://github.com/anuraghazra/github-readme-stats

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      # --- Stats 卡片：亮色版 ---
      - name: Generate stats card (light)
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&rank_icon=github&custom_title=Pfolg Stats&theme=transparent
          path: profile/stats-light.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      # --- Stats 卡片：暗色版 ---
      - name: Generate stats card (dark)
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&rank_icon=github&custom_title=Pfolg Stats&theme=prussian
          path: profile/stats-dark.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      # --- 语言卡片：亮色版 ---
      - name: Generate top languages card (light)
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&layout=compact&langs_count=8&stats_format=bytes&exclude_repo=EMO,QuickTray&theme=transparent
          path: profile/top-langs-light.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      # --- 语言卡片：暗色版 ---
      - name: Generate top languages card (dark)
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&layout=compact&langs_count=8&stats_format=bytes&exclude_repo=EMO,QuickTray&theme=prussian
          path: profile/top-langs-dark.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit cards
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Update README cards (light + dark)
          file_pattern: profile/*.svg
          commit_user_name: github-actions[bot]
          commit_user_email: 41898282+github-actions[bot]@users.noreply.github.com
          commit_author: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>


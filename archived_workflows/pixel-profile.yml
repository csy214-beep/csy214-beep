name: pixel-profile

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate pixel-profile cards directly to profile/
        uses: LuciNyan/pixel-profile/action@main
        with:
          outputs: |
            profile/github-stats.svg?username=${{ github.repository_owner }}&screen_effect=false&theme=fuji&dithering=true&hide=avatar&pixelate_avatar=false
            profile/github-stats-dark.svg?username=${{ github.repository_owner }}&theme=fuji&pixelate_avatar=false
          crt_outputs: |
            profile/github-stats-crt.svg?username=${{ github.repository_owner }}&include_all_commits=true&theme=fuji&pixelate_avatar=false

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add profile/
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: update pixel-profile cards"
          git push
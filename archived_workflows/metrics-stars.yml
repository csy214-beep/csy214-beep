name: Update Stars metrics cards

# https://github.com/lowlighter/metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      COMMIT_USER: github-actions[bot]
      COMMIT_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
    steps:
      - uses: actions/checkout@v6

      - name: Generate Languages card
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          filename: profile/languages.svg
          base: ""
          plugin_languages: yes
          languages_details: "percentage, bytes-size"
          config_display: "large"

      - name: Generate Star lists languages card
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          filename: profile/starlists-languages.svg
          base: ""
          plugin_starlists: yes
          plugin_starlists_languages: yes
          plugin_starlists_limit_languages: 8

      - name: Generate Starred topics icons card
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          filename: profile/topics-icons.svg
          base: ""
          plugin_topics: yes
          plugin_topics_mode: icons
          plugin_topics_limit: 12

      - name: Commit generated cards
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Update Stars metrics cards
          file_pattern: profile/*.svg
          commit_user_name: ${{ env.COMMIT_USER }}
          commit_user_email: ${{ env.COMMIT_EMAIL }}
          commit_author: ${{ env.COMMIT_USER }} <${{ env.COMMIT_EMAIL }}>
